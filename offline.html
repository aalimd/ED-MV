<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <title>Offline - ED VentGuide Pro</title>
  <style>
    :root{color-scheme:light dark;--theme:#2563eb;--bg:#f1f5f9;--surface:#fff;--text:#0f172a;--muted:#64748b;--border:#dbe3ef}
    @media (prefers-color-scheme:dark){:root{--bg:#0b0f1a;--surface:#141929;--text:#f8fafc;--muted:#94a3b8;--border:#26344f}}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text)}
    main{width:min(100%,420px);padding:30px 24px;border:1px solid var(--border);border-radius:8px;background:var(--surface);box-shadow:0 16px 50px rgba(15,23,42,.14);text-align:center}
    img{width:72px;height:72px;margin-bottom:18px;border-radius:18px}
    h1{margin:0 0 10px;font-size:1.45rem;line-height:1.2}
    p{margin:0;color:var(--muted);line-height:1.55;font-weight:600}
    button{margin-top:22px;min-height:44px;border:0;border-radius:8px;background:var(--theme);color:#fff;font-weight:800;padding:0 18px;font:inherit;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <img src="assets/pwa/icon-192.png" alt="">
    <h1>You are offline</h1>
    <p>Reconnect to continue using ED VentGuide Pro.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
